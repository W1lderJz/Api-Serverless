<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Crear Cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list lines="none" class="form-list">
    <form [formGroup]="formulario" (ngSubmit)="registrar()">

      <ion-item class="form-item">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-input type="text" placeholder="Nombre completo" formControlName="nombre"></ion-input>
      </ion-item>
      <ion-text color="danger" class="ferr" *ngIf="nombre?.invalid && nombre?.touched">
        <span *ngIf="nombre?.errors?.['required']">Nombre requerido</span>
      </ion-text>

      <ion-item class="form-item">
        <ion-icon slot="start" name="mail-outline"></ion-icon>
        <ion-input type="email" placeholder="Email" formControlName="email"></ion-input>
      </ion-item>
      <ion-text color="danger" class="ferr" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">Email requerido</span>
        <span *ngIf="email?.errors?.['email']">Email inválido</span>
      </ion-text>

      <ion-item class="form-item">
        <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
        <ion-input type="password" placeholder="Contraseña (mín. 8)" formControlName="password"></ion-input>
      </ion-item>
      <ion-text color="danger" class="ferr" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">Contraseña requerida</span>
        <span *ngIf="password?.errors?.['minlength']">Mínimo 8 caracteres</span>
      </ion-text>

      <ion-text color="danger" class="ferr" *ngIf="mensajeError"><p>{{ mensajeError }}</p></ion-text>
      <ion-text color="success" class="ferr" *ngIf="mensajeExito"><p>{{ mensajeExito }}</p></ion-text>

      <ion-button expand="block" type="submit" [disabled]="cargando" class="btn-main">
        <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
        <span *ngIf="!cargando">Registrarse</span>
      </ion-button>

      <ion-button expand="block" fill="clear" routerLink="/login">
        ¿Ya tienes cuenta? Inicia sesión
      </ion-button>

    </form>
  </ion-list>

</ion-content>
