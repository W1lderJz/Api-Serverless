<ion-content class="login-bg">
  <div class="login-wrap">

    <div class="login-hero">
      <div class="login-icon-box">
        <ion-icon name="cloud-done-outline"></ion-icon>
      </div>
      <h1>Bienvenido</h1>
      <p>API Serverless · AWS Lambda</p>
    </div>

    <div class="login-card">
      <form [formGroup]="formulario" (ngSubmit)="iniciarSesion()">

        <ion-list lines="none" class="form-list">
          <ion-item class="form-item">
            <ion-icon slot="start" name="mail-outline"></ion-icon>
            <ion-input
              type="email"
              placeholder="Email"
              formControlName="email"
              label-placement="stacked">
            </ion-input>
          </ion-item>
          <ion-text color="danger" class="ferr" *ngIf="email?.invalid && email?.touched">
            <span *ngIf="email?.errors?.['required']">Email requerido</span>
            <span *ngIf="email?.errors?.['email']">Email inválido</span>
          </ion-text>

          <ion-item class="form-item">
            <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
            <ion-input
              type="password"
              placeholder="Contraseña"
              formControlName="password"
              label-placement="stacked">
            </ion-input>
          </ion-item>
          <ion-text color="danger" class="ferr" *ngIf="password?.invalid && password?.touched">
            <span *ngIf="password?.errors?.['required']">Contraseña requerida</span>
            <span *ngIf="password?.errors?.['minlength']">Mínimo 8 caracteres</span>
          </ion-text>
        </ion-list>

        <ion-text color="danger" class="api-err" *ngIf="mensajeError">
          <p>{{ mensajeError }}</p>
        </ion-text>

        <ion-button expand="block" type="submit" [disabled]="cargando" class="btn-login">
          <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
          <span *ngIf="!cargando">Iniciar Sesión</span>
        </ion-button>

        <ion-button expand="block" fill="outline" routerLink="/registro" class="btn-register">
          Crear cuenta
        </ion-button>

      </form>
    </div>

    <div class="aws-status">
      <span class="live-dot"></span>
      <span>Conectado a AWS Lambda</span>
    </div>

  </div>
</ion-content>
