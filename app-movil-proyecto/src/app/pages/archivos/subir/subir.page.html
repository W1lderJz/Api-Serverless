<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Subir Archivo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="upload-wrap">

    <div class="drop-zone" (click)="fileInput.click()" [class.has-file]="archivoSeleccionado">
      <input #fileInput type="file"
        accept="image/jpeg,image/png,image/gif,application/pdf,text/plain"
        (change)="seleccionarArchivo($event)"
        style="display:none" />

      <ng-container *ngIf="!archivoSeleccionado">
        <div class="drop-icon-box">
          <ion-icon name="cloud-upload-outline"></ion-icon>
        </div>
        <strong>Seleccionar archivo</strong>
        <small>JPG, PNG, GIF, PDF, TXT · Máx 10MB</small>
      </ng-container>

      <ng-container *ngIf="archivoSeleccionado">
        <img *ngIf="esImagen && previewUrl" [src]="previewUrl" class="preview-img" />
        <div *ngIf="!esImagen" class="file-preview">
          <ion-icon name="document-outline"></ion-icon>
          <span>{{ archivoSeleccionado.name }}</span>
        </div>
      </ng-container>
    </div>

    <ng-container *ngIf="estado$ | async as st">
      <div class="progress-box" *ngIf="st.cargando">
        <div class="progress-header">
          <span>Subiendo a S3...</span>
          <span class="pct">{{ st.progreso }}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" [style.width]="st.progreso + '%'"></div>
        </div>
      </div>

      <div class="result-box error" *ngIf="st.error">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>{{ st.error }}</span>
      </div>

      <div class="result-box success" *ngIf="st.urlArchivo">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <div>
          <p class="result-title">Archivo subido a S3</p>
          <p class="result-url">{{ st.urlArchivo }}</p>
        </div>
      </div>
    </ng-container>

    <button class="btn-upload"
      [disabled]="!archivoSeleccionado || ((estado$ | async)?.cargando)"
      (click)="subir()">
      <ion-icon name="cloud-upload-outline"></ion-icon>
      Subir Archivo
    </button>

    <button class="btn-cancel" *ngIf="archivoSeleccionado"
      (click)="archivoSeleccionado = null; previewUrl = null; vm.limpiar()">
      Cancelar
    </button>

  </div>
</ion-content>
