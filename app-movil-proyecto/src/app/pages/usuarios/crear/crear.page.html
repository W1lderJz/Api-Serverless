<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/usuarios"></ion-back-button>
    </ion-buttons>
    <ion-title>Crear Usuario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="formulario" (ngSubmit)="crear()">

    <ion-item>
      <ion-label position="floating">Nombre</ion-label>
      <ion-input type="text" formControlName="nombre"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="nombre?.invalid && nombre?.touched">
      <small *ngIf="nombre?.errors?.['required']">El nombre es requerido</small>
    </ion-text>

    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input type="email" formControlName="email"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="email?.invalid && email?.touched">
      <small *ngIf="email?.errors?.['required']">El email es requerido</small>
      <small *ngIf="email?.errors?.['email']">Ingrese un email válido</small>
    </ion-text>

    <ion-item>
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" formControlName="password"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="password?.invalid && password?.touched">
      <small *ngIf="password?.errors?.['required']">La contraseña es requerida</small>
      <small *ngIf="password?.errors?.['minlength']">Mínimo 8 caracteres</small>
    </ion-text>

    <ion-text color="danger" *ngIf="error$ | async as error">
      <p>{{ error }}</p>
    </ion-text>

    <ion-button expand="block" type="submit" [disabled]="cargando$ | async" class="ion-margin-top">
      <ion-spinner *ngIf="cargando$ | async" name="crescent"></ion-spinner>
      <span *ngIf="!(cargando$ | async)">Crear Usuario</span>
    </ion-button>

  </form>

</ion-content>
