<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/usuarios"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle de Usuario</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="editar()">
        <ion-icon name="pencil-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="cargando$ | async" class="ion-text-center ion-padding">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ion-text color="danger" *ngIf="error$ | async as error">
    <p>{{ error }}</p>
  </ion-text>

  <ion-card *ngIf="usuario$ | async as usuario">
    <ion-card-header>
      <ion-card-title>{{ usuario.nombre }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list lines="none">
        <ion-item>
          <ion-label>
            <p>Email</p>
            <h3>{{ usuario.email }}</h3>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Creado</p>
            <h3>{{ usuario.created_at | date:'medium' }}</h3>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <p>Actualizado</p>
            <h3>{{ usuario.updated_at | date:'medium' }}</h3>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

</ion-content>
