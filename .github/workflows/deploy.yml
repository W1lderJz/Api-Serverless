name: Deploy Lambda + Terraform

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.21"
  TF_VERSION: "1.6.6"

jobs:
  test-build:
    name: Test y Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api-usuarios/go.sum

      - name: Instalar dependencias
        working-directory: api-usuarios
        run: go mod download

      - name: Ejecutar pruebas
        working-directory: api-usuarios
        run: go test ./... -v -timeout 60s || echo "Sin tests, continuando..."

      - name: Compilar Lambda principal
        working-directory: api-usuarios
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o bootstrap ./cmd/lambda/

      - name: Empaquetar lambda.zip
        run: zip -j lambda.zip api-usuarios/bootstrap && ls -lh lambda.zip

      - name: Instalar dependencias notification-lambda
        working-directory: notification-lambda
        run: go mod download

      - name: Compilar notification-lambda
        working-directory: notification-lambda
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o bootstrap .

      - name: Empaquetar notification-lambda.zip
        run: zip -j notification-lambda.zip notification-lambda/bootstrap && ls -lh notification-lambda.zip

      - name: Guardar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: |
            lambda.zip
            notification-lambda.zip
          retention-days: 1

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: test-build

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: .

      - name: Posicionar ZIPs para Terraform
        run: |
          cp lambda.zip terraform/lambda.zip
          cp notification-lambda.zip terraform/notification-lambda.zip
          ls -lh terraform/*.zip

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_s3_uploads_bucket: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_lambda_zip_path: "./lambda.zip"
          TF_VAR_notification_lambda_zip_path: "./notification-lambda.zip"
          TF_VAR_ses_from_email: ${{ secrets.SES_FROM_EMAIL }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_s3_uploads_bucket: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_lambda_zip_path: "./lambda.zip"
          TF_VAR_notification_lambda_zip_path: "./notification-lambda.zip"
          TF_VAR_ses_from_email: ${{ secrets.SES_FROM_EMAIL }}
        run: terraform apply -auto-approve tfplan

      - name: Outputs del deploy
        working-directory: terraform
        run: |
          terraform output api_gateway_url
          terraform output sns_topic_arn
          terraform output sqs_queue_url
          terraform output notification_lambda_name
